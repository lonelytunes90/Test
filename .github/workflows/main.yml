name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Buildozer dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo6 cmake libffi-dev libssl-dev
          # Install specific tools often needed by p4a
          sudo apt install -y libltdl-dev libffi-dev libssl-dev
          pip install --upgrade buildozer cython virtualenv

      - name: Build with Buildozer
        run: |
          # Use 'debug' with verbose log level to see the real error
          yes | buildozer -v android debug
        env:
          BUILDOZER_ALLOW_KIVY_NEW_DESIGN: 1
          # This helps with some permission issues in GitHub Actions
          BUILDOZER_BIN_DIR: ./bin

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MediaDownloader-APK
          path: bin/*.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MediaDownloader-APK-${{ steps.get-date.outputs.date }}
          path: bin/*.apk
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MediaDownloader-APK-${{ steps.get-date.outputs.date }}
          path: bin/*.apk
